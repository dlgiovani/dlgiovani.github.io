server {
    listen 80;
    server_name eleicoes.dlgiovani.dev;

    # certbot --nginx will add SSL after deploy
    root /home/opc/websites/dlgiovani.dev/portfolio/dist;
    index index.html;

    location = / {
        return 301 /eleicoes/;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

server {
    listen 80;
    server_name admin-session.dlgiovani.dev;

    # certbot --nginx will add SSL after deploy
    # gated only by the ADMIN_API_KEY entered in the page (noindex, no public links)
    # React (Vite) app — nginx serves the built bundle in admin/dist
    root /home/opc/websites/dlgiovani.dev/admin/dist;
    index index.html;

    # same-origin proxy so the admin app calls /api/consulting without CORS
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name dlgiovani.dev www.dlgiovani.dev;

    # certbot --nginx will replace this block with SSL + HTTP→HTTPS redirect
    root /home/opc/websites/dlgiovani.dev/portfolio/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
